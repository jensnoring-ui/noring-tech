/* Soft fade-out at the bottom edge so the cards section emerges from the same atmosphere */
.hero::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 28%;
  background: linear-gradient(to bottom, transparent 0%, var(--bg) 92%);
  pointer-events: none;
}

/* On narrow viewports the wide image becomes a thin strip - constrain min height
   so the ring stays visually present, and shift focus to the center */
@media (max-width: 720px) {
  .hero {
    aspect-ratio: auto;
    height: 56vh;
    min-height: 380px;
    max-height: 620px;
    background-position: center 35%;
  }
  .hero::after {
    height: 22%;
  }
}

/* Subtitle sits below the baked-in NORING logo, low in the image */
.hero-tag {
  position: absolute;
  left: 50%;
  bottom: 14%;
  transform: translateX(-50%);
  font-size: 0.62rem;
  letter-spacing: 0.45em;
  text-transform: uppercase;
  color: rgba(212, 180, 110, 0.78);
  text-shadow: 0 0 18px rgba(0,0,0,0.9);
  white-space: nowrap;
  z-index: 2;
}

@media (max-width: 720px) {
  .hero-tag {
    bottom: 11%;
    font-size: 0.55rem;
    letter-spacing: 0.35em;
  }
}

/* ---------- CARDS SECTION ---------- */
.section {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
  padding: 1rem 1.25rem 6rem;
  margin-top: -3rem; /* pull cards up into the hero fade so the transition feels continuous */
}

.section-label {
  text-align: center;
  font-size: 0.6rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.4rem;
}

.section-rule {
  width: 36px;
  height: 1px;
  background: var(--accent);
  opacity: 0.4;
  margin: 0 auto 3rem;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 2.25rem 1rem;
  max-width: 460px;
  margin: 0 auto;
  width: 100%;
}

.project {
  display: flex;
  flex-direction: column;
  flex: 0 0 calc(50% - 0.5rem);
}

@media (min-width: 640px) {
  .grid {
    gap: 3rem 1.5rem;
    max-width: none;
  }
  .project {
    flex: 0 0 220px;
  }
}

@media (min-width: 1024px) {
  .grid {
    gap: 3.5rem 2rem;
  }
  .project {
    flex: 0 0 240px;
  }
}

/* ---------- CARDS ---------- */
.card {
  position: relative;
  display: block;
  aspect-ratio: 2 / 3;
  border-radius: 14px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  isolation: isolate;
}

/* Diffuse outer halo - the breathing glow */
.card::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 17px;
  background: linear-gradient(135deg,
    var(--glow-3) 0%,
    var(--glow-2) 28%,
    var(--glow-4) 50%,
    var(--glow-1) 72%,
    var(--glow-3) 100%);
  filter: blur(14px);
  opacity: 0.55;
  z-index: -2;
  animation: glow-pulse 3.6s ease-in-out infinite;
}

/* Sharp inner rim */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 14px;
  background: linear-gradient(135deg,
    var(--glow-2) 0%,
    var(--glow-4) 50%,
    var(--glow-3) 100%);
  z-index: -1;
  opacity: 0.85;
}

@keyframes glow-pulse {
  0%, 100% {
    opacity: 0.50;
    filter: blur(13px);
  }
  50% {
    opacity: 0.80;
    filter: blur(20px);
  }
}

/* Stagger so cards don't pulse in unison */
.card:nth-child(2)::before { animation-delay: -0.9s; }
.card:nth-child(3)::before { animation-delay: -1.8s; }
.card:nth-child(4)::before { animation-delay: -2.7s; }
.card:nth-child(5)::before { animation-delay: -0.4s; }
.card:nth-child(6)::before { animation-delay: -2.2s; }

@media (hover: hover) {
  .card:hover { transform: translateY(-6px) scale(1.012); }
  .card:hover::before {
    opacity: 0.95;
    animation-duration: 1.6s;
  }
}

.card-inner {
  position: absolute;
  inset: 1.5px;
  border-radius: 12px;
  overflow: hidden;
  background: var(--surface);
}

.card-image {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-color: var(--surface);
}

.card-image.placeholder {
  background:
    radial-gradient(circle at 40% 35%, rgba(212, 180, 110, 0.22) 0%, transparent 50%),
    radial-gradient(circle at 65% 70%, rgba(80, 100, 200, 0.14) 0%, transparent 60%),
    linear-gradient(160deg, #1a1525 0%, #0a0a14 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.placeholder-letter {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 4.5rem;
  color: rgba(212, 180, 110, 0.30);
  line-height: 1;
}

.card-title-bar {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 1.4rem 0.8rem 0.9rem;
  background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
  pointer-events: none;
}

.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 0.78rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text);
  text-align: center;
  text-shadow: 0 1px 4px rgba(0,0,0,0.85);
}

@media (min-width: 640px) {
  .card-title { font-size: 0.85rem; }
}

/* ---------- CAPTIONS ---------- */
.card-caption {
  text-align: left;
  padding: 1.1rem 0.1rem 0;
}

.card-tagline {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--accent);
  margin-bottom: 0.6rem;
  line-height: 1.25;
  letter-spacing: 0.005em;
  text-align: center;
}

.card-description {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  font-size: 0.78rem;
  line-height: 1.55;
  color: rgba(232, 228, 220, 0.7);
  letter-spacing: 0;
}

@media (min-width: 640px) {
  .card-tagline { font-size: 0.95rem; }
  .card-description { font-size: 0.82rem; }
}

.contact {
  max-width: 1200px;
  margin: 5rem auto 0;
  padding: 0 1.25rem;
  text-align: center;
}

.contact-label {
  font-size: 0.6rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.4rem;
}

.contact-rule {
  width: 36px;
  height: 1px;
  background: var(--accent);
  opacity: 0.4;
  margin: 0 auto 2rem;
}

.contact-email {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.3rem, 4.5vw, 2rem);
  letter-spacing: 0.01em;
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.25s ease, color 0.25s ease;
  display: inline-block;
  padding-bottom: 0.15rem;
}

.contact-email:hover {
  border-bottom-color: var(--accent);
  color: #f0d8a0;
}

footer {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  max-width: 1200px;
  margin-left: auto;
  margin-right: auto;
  padding-left: 1.25rem;
  padding-right: 1.25rem;
  padding-bottom: 2rem;
}

@media (prefers-reduced-motion: reduce) {
  .card::before { animation: none; opacity: 0.7; }
  .card { transition: none; }
}
</style>

    showTitle: true
  }

const grid = document.getElementById('grid');

projects.forEach(p => {
  const projectEl = document.createElement('div');
  projectEl.className = 'project';

  const a = document.createElement('a');
  a.className = 'card';
  a.href = p.url || '#';
  if (p.url && p.url !== '#' && !p.url.startsWith('#')) {
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
  }

  const inner = document.createElement('div');
  inner.className = 'card-inner';

  const img = document.createElement('div');
  if (p.image) {
    img.className = 'card-image';
    img.style.backgroundImage = "url('" + p.image + "')";
  } else {
    img.className = 'card-image placeholder';
    const letter = document.createElement('div');
    letter.className = 'placeholder-letter';
    letter.textContent = p.title ? p.title.charAt(0).toUpperCase() : '?';
    img.appendChild(letter);
  }
  inner.appendChild(img);

  if (p.showTitle) {
    const titleBar = document.createElement('div');
    titleBar.className = 'card-title-bar';
    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = p.title;
    titleBar.appendChild(title);
    inner.appendChild(titleBar);
  }

  a.appendChild(inner);
  projectEl.appendChild(a);

  if (p.tagline || p.description) {
    const caption = document.createElement('div');
    caption.className = 'card-caption';
    if (p.tagline) {
      const tagline = document.createElement('div');
      tagline.className = 'card-tagline';
      const parts = p.tagline.split('\n');
      parts.forEach((part, i) => {
        if (i > 0) tagline.appendChild(document.createElement('br'));
        tagline.appendChild(document.createTextNode(part));
      });
      caption.appendChild(tagline);
    }
    if (p.description) {
      const desc = document.createElement('div');
      desc.className = 'card-description';
      desc.textContent = p.description;
      caption.appendChild(desc);
    }
    projectEl.appendChild(caption);
  }

  grid.appendChild(projectEl);
});
</script>
